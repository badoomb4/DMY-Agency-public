<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="10 15 660 260" width="700" height="280">
  <defs>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Convergence lines from sources to merge point -->
  <g id="arrow-source-top" opacity="0">
    <path class="arrow-path" d="M 112 55 L 155 115" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <g id="arrow-source-mid" opacity="0">
    <path class="arrow-path" d="M 112 140 L 155 140" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <g id="arrow-source-bot" opacity="0">
    <path class="arrow-path" d="M 112 225 L 155 165" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Main flow arrows -->
  <g id="arrow-1" opacity="0">
    <path class="arrow-path" d="M 160 140 L 218 140" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 215 136 L 223 140 L 215 144" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-2" opacity="0">
    <path class="arrow-path" d="M 320 140 L 368 140" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 365 136 L 373 140 L 365 144" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-3a" opacity="0">
    <path class="arrow-path" d="M 470 128 L 538 78" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 534 74 L 543 76 L 537 84" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-3b" opacity="0">
    <path class="arrow-path" d="M 470 152 L 538 202" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 534 206 L 543 204 L 537 196" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- SOURCE 1: App Web -->
  <g id="node-source-1" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="22" width="92" height="62" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Browser window -->
    <rect x="37" y="30" width="34" height="24" rx="3" stroke="#737373" stroke-width="1.3" fill="none"/>
    <line x1="37" y1="37" x2="71" y2="37" stroke="#737373" stroke-width="0.8"/>
    <circle cx="41" cy="33.5" r="1.2" fill="#ef4444"/>
    <circle cx="45.5" cy="33.5" r="1.2" fill="#eab308"/>
    <circle cx="50" cy="33.5" r="1.2" fill="#22c55e"/>
    <text x="64" y="73" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">App Web</text>
  </g>

  <!-- SOURCE 2: ChatBot Telegram -->
  <g id="node-source-2" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="108" width="92" height="62" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/telegram.svg" x="43" y="114" width="22" height="22"/>
    <text x="64" y="148" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">ChatBot</text>
    <text x="64" y="161" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Telegram</text>
  </g>

  <!-- SOURCE 3: Site Vitrine -->
  <g id="node-source-3" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="196" width="92" height="62" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Globe icon -->
    <circle cx="54" cy="214" r="10" stroke="#737373" stroke-width="1.3" fill="none"/>
    <ellipse cx="54" cy="214" rx="5" ry="10" stroke="#737373" stroke-width="0.8" fill="none"/>
    <line x1="44" y1="214" x2="64" y2="214" stroke="#737373" stroke-width="0.8"/>
    <text x="64" y="247" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">Site Vitrine</text>
  </g>

  <!-- NODE: Google Sheets -->
  <g id="node-sheets" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="220" y="108" width="100" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/google-sheets.svg" x="257" y="114" width="26" height="26"/>
    <text x="270" y="157" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Google Sheets</text>
  </g>

  <!-- NODE: Email -->
  <g id="node-email" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="370" y="108" width="100" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/gmail.svg" x="404" y="114" width="32" height="26"/>
    <text x="420" y="157" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Email</text>
  </g>

  <!-- NODE: WhatsApp -->
  <g id="node-whatsapp" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="540" y="44" width="100" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/whatsapp.svg" x="577" y="50" width="26" height="26"/>
    <text x="590" y="97" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">WhatsApp</text>
  </g>

  <!-- NODE: Telegram -->
  <g id="node-telegram" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="540" y="172" width="100" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/telegram.svg" x="577" y="178" width="26" height="26"/>
    <text x="590" y="225" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Telegram</text>
  </g>

  <!-- Animated dots -->
  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
