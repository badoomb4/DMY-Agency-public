<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 300" width="700" height="300">
  <defs>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ARROWS -->
  <g id="arrow-1" opacity="0">
    <path class="arrow-path" d="M 120 150 L 178 150" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 175 146 L 183 150 L 175 154" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-2" opacity="0">
    <path class="arrow-path" d="M 280 150 L 338 150" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 335 146 L 343 150 L 335 154" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-3a" opacity="0">
    <path class="arrow-path" d="M 440 140 L 528 92" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 524 88 L 533 91 L 527 98" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-3b" opacity="0">
    <path class="arrow-path" d="M 440 162 L 528 208" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 524 212 L 533 209 L 527 202" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- NODE: Formulaire -->
  <g id="node-form" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="20" y="120" width="100" height="60" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Form icon -->
    <line x1="42" y1="140" x2="98" y2="140" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="42" y1="148" x2="98" y2="148" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="42" y1="156" x2="78" y2="156" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
    <text x="70" y="174" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Formulaire</text>
  </g>

  <!-- NODE: Google Sheets -->
  <g id="node-sheets" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="180" y="120" width="100" height="60" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/google-sheets.svg" x="216" y="127" width="28" height="28"/>
    <text x="230" y="174" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Google Sheets</text>
  </g>

  <!-- NODE: Email -->
  <g id="node-email" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="340" y="120" width="100" height="60" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/gmail.svg" x="376" y="127" width="28" height="28"/>
    <text x="390" y="174" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Email</text>
  </g>

  <!-- NODE: WhatsApp -->
  <g id="node-whatsapp" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="530" y="60" width="100" height="60" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/whatsapp.svg" x="566" y="67" width="28" height="28"/>
    <text x="580" y="114" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">WhatsApp</text>
  </g>

  <!-- NODE: Telegram -->
  <g id="node-telegram" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="530" y="180" width="100" height="60" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logos/telegram.svg" x="566" y="187" width="28" height="28"/>
    <text x="580" y="234" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Telegram</text>
  </g>

  <!-- Animated dots -->
  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
