<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Timeline horizontal line, slightly wavy hand-drawn path -->
  <path
    id="timeline-line"
    d="M80,90 C120,88 160,92 200,90 C240,88 280,92 327,90 C374,88 414,92 450,90 C486,88 526,92 573,90 C620,88 660,92 700,90 C740,88 780,92 820,90"
    stroke="#333"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0"
    stroke-dasharray="1000"
    stroke-dashoffset="1000"
    fill="none"
  />

  <!-- ========== MILESTONE 1 — x=80 ========== -->
  <!-- Icon: Loupe (magnifying glass) above y=90 -->
  <g stroke="#333" stroke-linecap="round" fill="none" stroke-width="1.6">
    <circle cx="79" cy="47" r="10" transform="rotate(-3,79,47)"/>
    <line x1="86" y1="54" x2="93" y2="62" stroke-width="2"/>
    <!-- inner cross -->
    <line x1="74" y1="47" x2="84" y2="47"/>
    <line x1="79" y1="42" x2="79" y2="52"/>
  </g>

  <circle id="milestone-1" cx="80" cy="90" r="8" fill="#fa5d19" stroke="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>

  <g id="step-1" opacity="0" style="transform: translateY(8px);">
    <text x="80" y="116" font-family="'Geist', system-ui, sans-serif" font-size="16" fill="#262626" text-anchor="middle">Decouverte</text>
    <text x="80" y="131" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">Analyse de votre contexte,</text>
    <text x="80" y="143" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">contraintes et objectifs.</text>
  </g>

  <!-- ========== MILESTONE 2 — x=327 ========== -->
  <!-- Icon: Ruler + compass above y=90 -->
  <g stroke="#333" stroke-linecap="round" fill="none" stroke-width="1.6">
    <!-- ruler body -->
    <rect x="310" y="38" width="33" height="10" rx="2" transform="rotate(-5,326,43)"/>
    <line x1="315" y1="38" x2="315" y2="43" transform="rotate(-5,326,43)"/>
    <line x1="321" y1="38" x2="321" y2="41" transform="rotate(-5,326,43)"/>
    <line x1="327" y1="38" x2="327" y2="43" transform="rotate(-5,326,43)"/>
    <line x1="333" y1="38" x2="333" y2="41" transform="rotate(-5,326,43)"/>
    <line x1="339" y1="38" x2="339" y2="43" transform="rotate(-5,326,43)"/>
    <!-- compass needle hint -->
    <line x1="330" y1="55" x2="322" y2="64"/>
    <line x1="330" y1="55" x2="338" y2="64"/>
    <line x1="322" y1="64" x2="338" y2="64"/>
  </g>

  <circle id="milestone-2" cx="327" cy="90" r="8" fill="#fa5d19" stroke="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>

  <g id="step-2" opacity="0" style="transform: translateY(8px);">
    <text x="327" y="116" font-family="'Geist', system-ui, sans-serif" font-size="16" fill="#262626" text-anchor="middle">Strategie</text>
    <text x="327" y="131" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">Architecture, technologies</text>
    <text x="327" y="143" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">et planning de livraison.</text>
  </g>

  <!-- ========== MILESTONE 3 — x=573 ========== -->
  <!-- Icon: Lightning bolt above y=90 -->
  <g stroke="#333" stroke-linecap="round" fill="none" stroke-width="1.6">
    <path d="M578,34 L568,52 L575,52 L570,66 L582,48 L575,48 Z" fill="#fa5d19" fill-opacity="0.18" stroke="#333"/>
  </g>

  <circle id="milestone-3" cx="573" cy="90" r="8" fill="#fa5d19" stroke="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>

  <g id="step-3" opacity="0" style="transform: translateY(8px);">
    <text x="573" y="116" font-family="'Geist', system-ui, sans-serif" font-size="16" fill="#262626" text-anchor="middle">Execution</text>
    <text x="573" y="131" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">Developpement iteratif</text>
    <text x="573" y="143" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">avec demos regulieres.</text>
  </g>

  <!-- ========== MILESTONE 4 — x=820 ========== -->
  <!-- Icon: Rocket above y=90 -->
  <g stroke="#333" stroke-linecap="round" fill="none" stroke-width="1.6">
    <!-- rocket body -->
    <path d="M820,34 C825,38 828,46 826,55 L814,55 C812,46 815,38 820,34 Z" fill="#fa5d19" fill-opacity="0.18" stroke="#333"/>
    <!-- fins -->
    <path d="M814,52 L809,60 L814,58"/>
    <path d="M826,52 L831,60 L826,58"/>
    <!-- window -->
    <circle cx="820" cy="46" r="3" stroke="#333"/>
    <!-- flame -->
    <path d="M816,56 C817,60 820,62 820,62 C820,62 823,60 824,56" fill="none"/>
  </g>

  <circle id="milestone-4" cx="820" cy="90" r="8" fill="#fa5d19" stroke="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>

  <g id="step-4" opacity="0" style="transform: translateY(8px);">
    <text x="820" y="116" font-family="'Geist', system-ui, sans-serif" font-size="16" fill="#262626" text-anchor="middle">Livraison</text>
    <text x="820" y="131" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">Deploiement, formation</text>
    <text x="820" y="143" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#737373" text-anchor="middle">et support continu.</text>
  </g>

  <!-- Travelling pulse dot -->
  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>

</svg>
