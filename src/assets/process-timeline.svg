<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" fill="none">
  <defs>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Timeline line -->
  <path id="timeline-line" d="M 80 80 L 820 80" stroke="#ededed" stroke-width="2" stroke-linecap="round" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- MILESTONE 1 -->
  <circle id="milestone-1" cx="80" cy="80" r="8" fill="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>
  <g id="step-1" opacity="0" style="transform: translateY(8px);">
    <text x="80" y="112" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="600" fill="#262626">Decouverte</text>
    <text x="80" y="129" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">Analyse de votre contexte,</text>
    <text x="80" y="142" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">contraintes et objectifs.</text>
    <!-- Loupe icon -->
    <circle cx="80" cy="50" r="8" stroke="#d4d4d4" stroke-width="1.5" fill="none"/>
    <line x1="86" y1="56" x2="92" y2="62" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- MILESTONE 2 -->
  <circle id="milestone-2" cx="327" cy="80" r="8" fill="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>
  <g id="step-2" opacity="0" style="transform: translateY(8px);">
    <text x="327" y="112" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="600" fill="#262626">Strategie</text>
    <text x="327" y="129" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">Architecture, technologies</text>
    <text x="327" y="142" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">et planning de livraison.</text>
    <!-- Compass/ruler icon -->
    <rect x="315" y="42" width="24" height="16" rx="2" stroke="#d4d4d4" stroke-width="1.5" fill="none"/>
    <line x1="321" y1="42" x2="321" y2="48" stroke="#d4d4d4" stroke-width="1"/>
    <line x1="327" y1="42" x2="327" y2="46" stroke="#d4d4d4" stroke-width="1"/>
    <line x1="333" y1="42" x2="333" y2="48" stroke="#d4d4d4" stroke-width="1"/>
  </g>

  <!-- MILESTONE 3 -->
  <circle id="milestone-3" cx="573" cy="80" r="8" fill="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>
  <g id="step-3" opacity="0" style="transform: translateY(8px);">
    <text x="573" y="112" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="600" fill="#262626">Execution</text>
    <text x="573" y="129" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">Developpement iteratif</text>
    <text x="573" y="142" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">avec demos regulieres.</text>
    <!-- Lightning icon -->
    <path d="M 577 38 L 569 52 L 575 52 L 571 64 L 581 50 L 575 50 Z" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- MILESTONE 4 -->
  <circle id="milestone-4" cx="820" cy="80" r="8" fill="#fa5d19" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);"/>
  <g id="step-4" opacity="0" style="transform: translateY(8px);">
    <text x="820" y="112" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="600" fill="#262626">Livraison</text>
    <text x="820" y="129" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">Deploiement, formation</text>
    <text x="820" y="142" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#a3a3a3">et support continu.</text>
    <!-- Rocket icon -->
    <path d="M 820 38 C 824 42 826 48 825 54 L 815 54 C 814 48 816 42 820 38 Z" stroke="#d4d4d4" stroke-width="1.5" fill="none"/>
    <circle cx="820" cy="47" r="2" stroke="#d4d4d4" stroke-width="1" fill="none"/>
    <path d="M 815 54 L 812 60" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 825 54 L 828 60" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Dot pulse -->
  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
