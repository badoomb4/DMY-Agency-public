<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
  <defs>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Convergence arrows from sources to Diagnostic -->
  <g id="arrow-source-1" opacity="0">
    <path class="arrow-path" d="M 112 45 L 200 135" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <g id="arrow-source-2" opacity="0">
    <path class="arrow-path" d="M 112 110 L 200 145" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <g id="arrow-source-3" opacity="0">
    <path class="arrow-path" d="M 112 175 L 200 165" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <g id="arrow-source-4" opacity="0">
    <path class="arrow-path" d="M 112 240 L 200 185" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <g id="arrow-source-5" opacity="0">
    <path class="arrow-path" d="M 112 300 L 200 195" stroke="#ededed" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Main flow arrows -->
  <g id="arrow-1" opacity="0">
    <path class="arrow-path" d="M 310 170 L 388 170" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 385 166 L 393 170 L 385 174" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-2" opacity="0">
    <path class="arrow-path" d="M 500 170 L 548 170" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 545 166 L 553 170 L 545 174" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- SOURCE 1: Notion -->
  <g id="node-source-1" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="14" width="92" height="58" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/notion-logo-svgrepo-com.svg" x="43" y="19" width="22" height="22"/>
    <text x="64" y="60" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Notion</text>
  </g>

  <!-- SOURCE 2: Trello -->
  <g id="node-source-2" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="80" width="92" height="58" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/trello-color-svgrepo-com.svg" x="43" y="85" width="22" height="22"/>
    <text x="64" y="126" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Trello</text>
  </g>

  <!-- SOURCE 3: Google Drive -->
  <g id="node-source-3" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="146" width="92" height="58" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/drive-color-svgrepo-com.svg" x="43" y="151" width="22" height="22"/>
    <text x="64" y="192" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Google Drive</text>
  </g>

  <!-- SOURCE 4: Documents locaux -->
  <g id="node-source-4" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="212" width="92" height="58" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Folder icon -->
    <path d="M 44 222 L 44 248 L 84 248 L 84 228 L 68 228 L 64 222 Z" stroke="#737373" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
    <text x="64" y="261" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#333">Docs locaux</text>
  </g>

  <!-- SOURCE 5: Système interne -->
  <g id="node-source-5" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="18" y="278" width="92" height="58" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Server icon -->
    <rect x="46" y="286" width="26" height="10" rx="2" stroke="#737373" stroke-width="1.2" fill="none"/>
    <rect x="46" y="298" width="26" height="10" rx="2" stroke="#737373" stroke-width="1.2" fill="none"/>
    <circle cx="66" cy="291" r="1.5" fill="#737373"/>
    <circle cx="66" cy="303" r="1.5" fill="#737373"/>
    <text x="64" y="325" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#333">Système interne</text>
  </g>

  <!-- NODE: Diagnostic IA -->
  <g id="node-diagnostic" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="205" y="138" width="105" height="64" rx="8" fill="white" stroke="#fa5d19" stroke-width="1.5"/>
    <!-- Magnifier icon -->
    <circle cx="245" cy="162" r="9" stroke="#fa5d19" stroke-width="1.3" fill="none"/>
    <line x1="252" y1="169" x2="258" y2="175" stroke="#fa5d19" stroke-width="1.3" stroke-linecap="round"/>
    <text x="258" y="187" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="600" fill="#fa5d19">Diagnostic IA</text>
  </g>

  <!-- NODE: Plan d'action -->
  <g id="node-plan" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="395" y="138" width="105" height="64" rx="8" fill="white" stroke="#fa5d19" stroke-width="1.5"/>
    <!-- Checklist icon -->
    <rect x="430" y="150" width="16" height="20" rx="2" stroke="#fa5d19" stroke-width="1.2" fill="none"/>
    <line x1="434" y1="157" x2="442" y2="157" stroke="#fa5d19" stroke-width="0.8"/>
    <line x1="434" y1="162" x2="440" y2="162" stroke="#fa5d19" stroke-width="0.8"/>
    <line x1="434" y1="167" x2="441" y2="167" stroke="#fa5d19" stroke-width="0.8"/>
    <text x="448" y="187" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="600" fill="#fa5d19">Plan d'action</text>
  </g>

  <!-- NODE: Feuille de route -->
  <g id="node-roadmap" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="555" y="138" width="105" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Calendar icon -->
    <rect x="593" y="150" width="20" height="18" rx="2" stroke="#737373" stroke-width="1.2" fill="none"/>
    <line x1="593" y1="156" x2="613" y2="156" stroke="#737373" stroke-width="0.8"/>
    <line x1="598" y1="148" x2="598" y2="152" stroke="#737373" stroke-width="1" stroke-linecap="round"/>
    <line x1="608" y1="148" x2="608" y2="152" stroke="#737373" stroke-width="1" stroke-linecap="round"/>
    <text x="608" y="187" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#737373">Feuille de route</text>
  </g>

  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
