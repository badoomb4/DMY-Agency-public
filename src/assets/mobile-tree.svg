<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 440" width="400" height="440">
  <defs>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- TRUNK PATHS -->
  <path id="trunk-1" d="M 200 65 L 200 108" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="trunk-2" d="M 200 158 L 200 205" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- BRANCH PATHS -->
  <path id="branch-ios" d="M 170 250 L 100 315" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="branch-android" d="M 230 250 L 300 315" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- NODE: Idee -->
  <g id="node-idea" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="158" y="20" width="84" height="44" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <text x="200" y="47" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Idee</text>
  </g>

  <!-- NODE: Design -->
  <g id="node-design" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="158" y="110" width="84" height="44" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <text x="200" y="137" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Design</text>
  </g>

  <!-- NODE: Codebase -->
  <g id="node-codebase" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="148" y="207" width="104" height="48" rx="8" fill="white" stroke="#fa5d19" stroke-width="2"/>
    <text x="200" y="236" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="600" fill="#fa5d19">Codebase</text>
  </g>

  <!-- NODE: iOS -->
  <g id="node-ios" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="56" y="293" width="88" height="48" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/app-store-svgrepo-com.svg" x="88" y="299" width="22" height="22"/>
    <text x="100" y="334" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="12" font-weight="500" fill="#333">iOS</text>
  </g>

  <!-- NODE: Android -->
  <g id="node-android" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="256" y="293" width="88" height="48" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <image href="/illustrations/logo-google-play.svg" x="288" y="299" width="22" height="22"/>

    <text x="300" y="334" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="12" font-weight="500" fill="#333">Android</text>
  </g>

  <!-- LEAVES: iOS (app icon style) -->
  <g id="leaf-ios-1" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="48" y="355" width="34" height="34" rx="8" fill="#fa5d19" opacity="0.08" stroke="#fa5d19" stroke-width="1" stroke-opacity="0.3"/>
    <text x="65" y="376" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" fill="#fa5d19">🔔</text>
    <text x="65" y="402" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#737373">Push</text>
  </g>
  <g id="leaf-ios-2" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="88" y="355" width="34" height="34" rx="8" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="105" y="376" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" fill="#3b82f6">📡</text>
    <text x="105" y="402" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#737373">Offline</text>
  </g>
  <g id="leaf-ios-3" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="128" y="355" width="34" height="34" rx="8" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="145" y="376" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" fill="#22c55e">⚡</text>
    <text x="145" y="402" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#737373">Perf</text>
  </g>

  <!-- LEAVES: Android (app icon style) -->
  <g id="leaf-android-1" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="248" y="355" width="34" height="34" rx="8" fill="#fa5d19" opacity="0.08" stroke="#fa5d19" stroke-width="1" stroke-opacity="0.3"/>
    <text x="265" y="376" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" fill="#fa5d19">🔔</text>
    <text x="265" y="402" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#737373">Push</text>
  </g>
  <g id="leaf-android-2" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="288" y="355" width="34" height="34" rx="8" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="305" y="376" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" fill="#3b82f6">📡</text>
    <text x="305" y="402" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#737373">Offline</text>
  </g>
  <g id="leaf-android-3" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="328" y="355" width="34" height="34" rx="8" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="345" y="376" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" fill="#22c55e">⚡</text>
    <text x="345" y="402" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="9" font-weight="500" fill="#737373">Perf</text>
  </g>

  <!-- DOT PULSE -->
  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
