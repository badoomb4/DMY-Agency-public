<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ARROWS -->
  <g id="arrow-1" opacity="0">
    <path class="arrow-path" d="M 130 140 L 198 140" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 195 136 L 203 140 L 195 144" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-2" opacity="0">
    <path class="arrow-path" d="M 300 140 L 358 140" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 355 136 L 363 140 L 355 144" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g id="arrow-3" opacity="0">
    <path class="arrow-path" d="M 460 140 L 528 140" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 525 136 L 533 140 L 525 144" fill="none" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- NODE 1: Trigger (Cron/API) -->
  <g id="node-1" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="20" y="108" width="110" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Clock/cron icon -->
    <circle cx="62" cy="130" r="12" stroke="#fa5d19" stroke-width="1.3" fill="none"/>
    <line x1="62" y1="130" x2="62" y2="122" stroke="#fa5d19" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="62" y1="130" x2="68" y2="133" stroke="#fa5d19" stroke-width="1.3" stroke-linecap="round"/>
    <text x="75" y="160" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">Trigger</text>
    <text x="75" y="172" text-anchor="middle" font-family="'Geist Mono', monospace" font-size="9" font-weight="500" fill="#a3a3a3">Cron / API</text>
  </g>

  <!-- NODE 2: Bot navigateur -->
  <g id="node-2" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="200" y="108" width="100" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Browser bot icon -->
    <rect x="228" y="114" width="34" height="24" rx="3" stroke="#737373" stroke-width="1.3" fill="none"/>
    <line x1="228" y1="121" x2="262" y2="121" stroke="#737373" stroke-width="0.8"/>
    <circle cx="232" cy="117.5" r="1.2" fill="#ef4444"/>
    <circle cx="236.5" cy="117.5" r="1.2" fill="#eab308"/>
    <circle cx="241" cy="117.5" r="1.2" fill="#22c55e"/>
    <!-- Cursor icon inside browser -->
    <path d="M 243 126 L 243 134 L 246 132 L 248 136 L 250 135 L 248 131 L 251 131 Z" fill="#fa5d19" stroke="none"/>
    <text x="250" y="155" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Bot ouvre</text>
    <text x="250" y="167" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">navigateur</text>
  </g>

  <!-- NODE 3: Actions (clics, formulaires) -->
  <g id="node-3" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="360" y="108" width="100" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Click/pointer icon -->
    <path d="M 402 116 L 402 130 L 406 127 L 409 133 L 412 132 L 409 126 L 413 126 Z" stroke="#737373" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
    <!-- Form fields -->
    <rect x="398" y="118" width="18" height="3" rx="1" fill="#d4d4d4"/>
    <rect x="398" y="123" width="14" height="3" rx="1" fill="#ededed"/>
    <text x="410" y="155" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Clics &amp;</text>
    <text x="410" y="167" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">formulaires</text>
  </g>

  <!-- NODE 4: Export données -->
  <g id="node-4" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="530" y="108" width="110" height="64" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Download/export icon -->
    <rect x="567" y="116" width="24" height="20" rx="2" stroke="#737373" stroke-width="1.3" fill="none"/>
    <path d="M 579 120 L 579 128" stroke="#737373" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 575 126 L 579 130 L 583 126" stroke="#737373" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="585" y="155" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Export</text>
    <text x="585" y="167" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">données</text>
  </g>

  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
