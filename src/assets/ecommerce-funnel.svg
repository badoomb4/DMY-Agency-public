<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480">
  <defs>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- SPOKE PATHS -->
  <path id="spoke-1" d="M 280 200 L 280 110" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-2" d="M 218 240 L 100 240" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-3" d="M 342 240 L 460 240" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-4" d="M 240 276 L 148 380" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-5" d="M 320 276 L 412 380" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- CENTER NODE: Site Vitrine -->
  <g id="node-center" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="215" y="210" width="130" height="52" rx="10" fill="white" stroke="#fa5d19" stroke-width="2"/>
    <text x="280" y="242" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="16" font-weight="600" fill="#fa5d19">Site Vitrine</text>
  </g>

  <!-- SATELLITE: Marketing Digital (top) -->
  <g id="node-seo" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="185" y="20" width="190" height="82" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <text x="280" y="44" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="600" fill="#333">Marketing Digital</text>
    <!-- Social icons row -->
    <!-- Facebook -->
    <rect x="207" y="56" width="28" height="28" rx="6" fill="#1877F2" opacity="0.1"/>
    <text x="221" y="76" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="700" fill="#1877F2">f</text>
    <!-- Google -->
    <rect x="241" y="56" width="28" height="28" rx="6" fill="#EA4335" opacity="0.1"/>
    <text x="255" y="76" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="700" fill="#EA4335">G</text>
    <!-- Instagram -->
    <rect x="275" y="56" width="28" height="28" rx="6" fill="#E4405F" opacity="0.1"/>
    <rect x="283" y="64" width="12" height="12" rx="3" stroke="#E4405F" stroke-width="1.5" fill="none"/>
    <circle cx="289" cy="70" r="2.5" stroke="#E4405F" stroke-width="1.5" fill="none"/>
    <circle cx="296" cy="65" r="1" fill="#E4405F"/>
    <!-- X (Twitter) -->
    <rect x="309" y="56" width="28" height="28" rx="6" fill="#000" opacity="0.06"/>
    <text x="323" y="76" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="700" fill="#333">𝕏</text>
  </g>

  <!-- SATELLITE: CMS (left) -->
  <g id="node-cms" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="6" y="210" width="136" height="60" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Grid/layout icon -->
    <rect x="24" y="226" width="16" height="12" rx="2" stroke="#737373" stroke-width="1.5" fill="none"/>
    <rect x="44" y="226" width="16" height="12" rx="2" stroke="#737373" stroke-width="1.5" fill="none"/>
    <rect x="24" y="242" width="36" height="12" rx="2" stroke="#737373" stroke-width="1.5" fill="none"/>
    <text x="90" y="246" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">CMS</text>
  </g>

  <!-- SATELLITE: Mailing (right) -->
  <g id="node-mailing" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="418" y="210" width="136" height="60" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Envelope icon -->
    <rect x="436" y="228" width="26" height="18" rx="2" stroke="#737373" stroke-width="1.5" fill="none"/>
    <path d="M 436 230 L 449 240 L 462 230" stroke="#737373" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="504" y="246" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="14" font-weight="600" fill="#333">Mailing</text>
  </g>

  <!-- SATELLITE: Console Admin (bottom-left) -->
  <g id="node-custom" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="48" y="366" width="160" height="60" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Terminal icon -->
    <rect x="66" y="380" width="30" height="22" rx="4" stroke="#a855f7" stroke-width="1.5" fill="none"/>
    <path d="M 72 388 L 78 392 L 72 396" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="80" y1="396" x2="88" y2="396" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round"/>
    <text x="148" y="394" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="600" fill="#333">Console</text>
    <text x="148" y="410" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="600" fill="#333">Admin</text>
  </g>

  <!-- SATELLITE: Stripe Paiement (bottom-right) -->
  <g id="node-stripe" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="352" y="366" width="160" height="60" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Card icon -->
    <rect x="370" y="380" width="30" height="22" rx="4" stroke="#635bff" stroke-width="1.5" fill="none"/>
    <rect x="370" y="387" width="30" height="5" fill="#635bff" opacity="0.15"/>
    <rect x="374" y="394" width="10" height="4" rx="1" stroke="#635bff" stroke-width="1" fill="none"/>
    <text x="432" y="392" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="15" font-weight="700" fill="#635bff">Stripe</text>
    <text x="432" y="410" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="12" font-weight="400" fill="#a3a3a3">Paiement</text>
  </g>

  <!-- DOT PULSE (kept for potential future use) -->
  <circle id="dot-pulse" r="5" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
