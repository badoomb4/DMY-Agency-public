<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 440 380" width="440" height="380">
  <defs>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- SPOKE PATHS (center to each satellite) -->
  <path id="spoke-1" d="M 220 170 C 218 130, 216 100, 220 55" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-2" d="M 185 190 C 145 185, 110 182, 60 185" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-3" d="M 255 190 C 295 185, 330 182, 380 185" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-4" d="M 195 215 C 160 250, 130 280, 100 310" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-5" d="M 245 215 C 280 250, 310 280, 340 310" stroke="#d4d4d4" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- CENTER NODE: Site Vitrine -->
  <g id="node-center" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <path d="M 170,172 C 172,168 210,168 220,169 C 262,168 268,172 269,175 C 270,188 269,212 268,215 C 266,218 230,219 220,218 C 174,219 172,216 171,213 C 170,200 170,175 170,172 Z" fill="white" stroke="#fa5d19" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="220" y="199" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="600" fill="#fa5d19">Site Vitrine</text>
  </g>

  <!-- SATELLITE: SEO & Ranking (top) -->
  <g id="node-seo" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <path d="M 182,28 C 184,25 212,25 220,26 C 252,25 256,28 257,31 C 258,42 257,62 256,65 C 254,68 228,69 220,68 C 186,69 184,66 183,63 C 182,52 182,31 182,28 Z" fill="white" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bar chart icon -->
    <g transform="translate(196, 32)">
      <rect x="0" y="14" width="5" height="10" rx="1" fill="#22c55e" opacity="0.7"/>
      <rect x="7" y="8" width="5" height="16" rx="1" fill="#3b82f6" opacity="0.7"/>
      <rect x="14" y="3" width="5" height="21" rx="1" fill="#fa5d19" opacity="0.7"/>
      <path d="M 2 12 L 9 6 L 16 1" stroke="#333" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>
    <text x="220" y="62" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">SEO & Ranking</text>
  </g>

  <!-- SATELLITE: CMS (left) -->
  <g id="node-cms" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <path d="M 15,168 C 17,165 45,165 60,166 C 95,165 100,168 101,171 C 102,182 101,198 100,201 C 98,204 70,205 60,204 C 20,205 18,202 17,199 C 16,188 15,171 15,168 Z" fill="white" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Grid/layout icon -->
    <g transform="translate(35, 172)">
      <rect x="0" y="0" width="10" height="7" rx="1" fill="none" stroke="#333" stroke-width="1.2"/>
      <rect x="12" y="0" width="10" height="7" rx="1" fill="none" stroke="#333" stroke-width="1.2"/>
      <rect x="0" y="9" width="22" height="7" rx="1" fill="none" stroke="#333" stroke-width="1.2"/>
    </g>
    <text x="58" y="198" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">CMS</text>
  </g>

  <!-- SATELLITE: Mailing (right) -->
  <g id="node-mailing" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <path d="M 340,168 C 342,165 370,165 380,166 C 418,165 422,168 423,171 C 424,182 423,198 422,201 C 420,204 392,205 380,204 C 344,205 342,202 341,199 C 340,188 340,171 340,168 Z" fill="white" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Envelope icon -->
    <g transform="translate(358, 172)">
      <rect x="0" y="2" width="22" height="14" rx="1" fill="none" stroke="#333" stroke-width="1.2"/>
      <path d="M 0 3 L 11 10 L 22 3" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="382" y="198" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">Mailing</text>
  </g>

  <!-- SATELLITE: Sur mesure (bottom-left) -->
  <g id="node-custom" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <path d="M 50,292 C 52,289 85,289 100,290 C 140,289 145,292 146,295 C 147,306 146,326 145,329 C 143,332 110,333 100,332 C 55,333 53,330 52,327 C 51,316 50,295 50,292 Z" fill="white" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Code brackets icon -->
    <g transform="translate(72, 296)">
      <text font-family="'Geist Mono', monospace" font-size="16" fill="#a855f7" font-weight="600">&lt;/&gt;</text>
    </g>
    <text x="98" y="326" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">Sur mesure</text>
  </g>

  <!-- SATELLITE: Stripe (bottom-right) -->
  <g id="node-stripe" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <path d="M 295,292 C 297,289 325,289 340,290 C 380,289 385,292 386,295 C 387,306 386,326 385,329 C 383,332 350,333 340,332 C 300,333 298,330 297,327 C 296,316 295,295 295,292 Z" fill="white" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Stripe logo reference -->
    <g transform="translate(318, 296)">
      <text font-family="'Geist', system-ui, sans-serif" font-size="14" fill="#635bff" font-weight="700">Stripe</text>
    </g>
    <text x="340" y="326" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="500" fill="#333">Paiement</text>
  </g>

  <!-- DOT PULSE -->
  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
