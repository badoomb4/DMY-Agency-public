<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480">
  <defs>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- SPOKE PATHS -->
  <path id="spoke-1" d="M 280 200 L 280 100" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-2" d="M 220 240 L 100 240" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-3" d="M 340 240 L 460 240" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-4" d="M 240 276 L 150 380" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-5" d="M 320 276 L 410 380" stroke="#ededed" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- CENTER NODE: Site Vitrine -->
  <g id="node-center" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="215" y="210" width="130" height="52" rx="10" fill="white" stroke="#fa5d19" stroke-width="2"/>
    <text x="280" y="242" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="15" font-weight="600" fill="#fa5d19">Site Vitrine</text>
  </g>

  <!-- SATELLITE: SEO & Ranking (top) -->
  <g id="node-seo" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="210" y="38" width="140" height="56" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Bar chart icon -->
    <rect x="232" y="58" width="8" height="18" rx="2" fill="#22c55e" opacity="0.6"/>
    <rect x="244" y="50" width="8" height="26" rx="2" fill="#3b82f6" opacity="0.6"/>
    <rect x="256" y="42" width="8" height="34" rx="2" fill="#fa5d19" opacity="0.6"/>
    <text x="300" y="72" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">SEO</text>
  </g>

  <!-- SATELLITE: CMS (left) -->
  <g id="node-cms" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="10" y="212" width="130" height="56" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Grid/layout icon -->
    <rect x="30" y="226" width="14" height="10" rx="2" stroke="#d4d4d4" stroke-width="1.5" fill="none"/>
    <rect x="48" y="226" width="14" height="10" rx="2" stroke="#d4d4d4" stroke-width="1.5" fill="none"/>
    <rect x="30" y="240" width="32" height="10" rx="2" stroke="#d4d4d4" stroke-width="1.5" fill="none"/>
    <text x="100" y="246" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">CMS</text>
  </g>

  <!-- SATELLITE: Mailing (right) -->
  <g id="node-mailing" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="420" y="212" width="130" height="56" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Envelope icon -->
    <rect x="440" y="228" width="24" height="16" rx="2" stroke="#d4d4d4" stroke-width="1.5" fill="none"/>
    <path d="M 440 230 L 452 239 L 464 230" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="502" y="246" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Mailing</text>
  </g>

  <!-- SATELLITE: Console Admin (bottom-left) -->
  <g id="node-custom" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="55" y="366" width="150" height="56" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Terminal icon -->
    <rect x="75" y="378" width="26" height="20" rx="3" stroke="#a855f7" stroke-width="1.5" fill="none"/>
    <path d="M 80 386 L 85 390 L 80 394" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="87" y1="394" x2="94" y2="394" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round"/>
    <text x="130" y="400" text-anchor="start" font-family="'Geist', system-ui, sans-serif" font-size="12" font-weight="500" fill="#333">Console</text>
    <text x="130" y="414" text-anchor="start" font-family="'Geist', system-ui, sans-serif" font-size="12" font-weight="500" fill="#333">Admin</text>
  </g>

  <!-- SATELLITE: Stripe Paiement (bottom-right) -->
  <g id="node-stripe" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="355" y="366" width="150" height="56" rx="10" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Card icon -->
    <rect x="375" y="380" width="26" height="18" rx="3" stroke="#635bff" stroke-width="1.5" fill="none"/>
    <rect x="375" y="386" width="26" height="4" fill="#635bff" opacity="0.15"/>
    <rect x="379" y="392" width="8" height="3" rx="1" stroke="#635bff" stroke-width="1" fill="none"/>
    <text x="418" y="394" text-anchor="start" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="700" fill="#635bff">Stripe</text>
    <text x="418" y="410" text-anchor="start" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="400" fill="#737373">Paiement</text>
  </g>

  <!-- DOT PULSE -->
  <circle id="dot-pulse" r="5" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
