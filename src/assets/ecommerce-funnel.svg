<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 440 380" width="440" height="380">
  <defs>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- SPOKE PATHS -->
  <path id="spoke-1" d="M 220 168 L 220 65" stroke="#ededed" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-2" d="M 178 190 L 105 190" stroke="#ededed" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-3" d="M 262 190 L 335 190" stroke="#ededed" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-4" d="M 192 212 L 130 290" stroke="#ededed" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>
  <path id="spoke-5" d="M 248 212 L 310 290" stroke="#ededed" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- CENTER NODE -->
  <g id="node-center" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="170" y="170" width="100" height="44" rx="8" fill="white" stroke="#fa5d19" stroke-width="2"/>
    <text x="220" y="197" text-anchor="middle" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="600" fill="#fa5d19">Site Vitrine</text>
  </g>

  <!-- SATELLITE: SEO -->
  <g id="node-seo" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="172" y="24" width="96" height="40" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Mini bar chart -->
    <rect x="192" y="38" width="6" height="14" rx="1" fill="#22c55e" opacity="0.6"/>
    <rect x="201" y="33" width="6" height="19" rx="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="210" y="28" width="6" height="24" rx="1" fill="#fa5d19" opacity="0.6"/>
    <text x="238" y="49" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">SEO</text>
  </g>

  <!-- SATELLITE: CMS -->
  <g id="node-cms" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="20" y="170" width="84" height="40" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Grid icon -->
    <rect x="36" y="178" width="10" height="8" rx="1" stroke="#d4d4d4" stroke-width="1.2" fill="none"/>
    <rect x="48" y="178" width="10" height="8" rx="1" stroke="#d4d4d4" stroke-width="1.2" fill="none"/>
    <rect x="36" y="189" width="22" height="8" rx="1" stroke="#d4d4d4" stroke-width="1.2" fill="none"/>
    <text x="72" y="194" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">CMS</text>
  </g>

  <!-- SATELLITE: Mailing -->
  <g id="node-mailing" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="336" y="170" width="84" height="40" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <!-- Envelope icon -->
    <rect x="348" y="180" width="18" height="12" rx="1" stroke="#d4d4d4" stroke-width="1.2" fill="none"/>
    <path d="M 348 181 L 357 188 L 366 181" stroke="#d4d4d4" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="380" y="192" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Mailing</text>
  </g>

  <!-- SATELLITE: Sur mesure -->
  <g id="node-custom" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="60" y="278" width="100" height="40" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <text x="93" y="296" font-family="'Geist Mono', monospace" font-size="12" font-weight="500" fill="#a855f7">&lt;/&gt;</text>
    <text x="127" y="296" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Sur mesure</text>
  </g>

  <!-- SATELLITE: Stripe -->
  <g id="node-stripe" opacity="0" style="transform-box: fill-box; transform-origin: center; transform: scale(0.8);">
    <rect x="280" y="278" width="100" height="40" rx="8" fill="white" stroke="#ededed" stroke-width="1.5"/>
    <text x="310" y="296" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="700" fill="#635bff">Stripe</text>
    <text x="352" y="296" font-family="'Geist', system-ui, sans-serif" font-size="10" font-weight="500" fill="#333">Paiement</text>
  </g>

  <!-- DOT PULSE -->
  <circle id="dot-pulse" r="4" fill="#fa5d19" opacity="0" filter="url(#dot-glow)"/>
</svg>
